<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Port Scanner | Nadeem</title>

  <style>
    body {
      background: #020617;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      text-align: center;
      padding: 60px 20px;
    }

    h1 {
      color: #38bdf8;
      margin-bottom: 20px;
    }

    .box {
      max-width: 400px;
      margin: auto;
      background: #0f172a;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(56,189,248,0.2);
    }

    input {
      width: 70%;
      padding: 10px;
      background: #020617;
      border: 1px solid #38bdf8;
      color: white;
      border-radius: 6px;
      outline: none;
    }

    button {
      padding: 10px 15px;
      margin-left: 10px;
      background: #38bdf8;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .progress {
      height: 6px;
      background: #1e293b;
      margin-top: 15px;
      border-radius: 5px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: #38bdf8;
      transition: width 0.3s;
    }

    .result {
      margin-top: 20px;
      text-align: left;
      font-size: 14px;
    }

    .open { color: #22c55e; }
    .closed { color: #ef4444; }
    .error { color: #f87171; text-align: center; }

    a {
      display: inline-block;
      margin-top: 20px;
      color: #38bdf8;
      text-decoration: none;
    }
  </style>
</head>

<body>

<h1>🌐 Port Scanner</h1>

<div class="box">
  <input type="text" id="target" placeholder="Enter IP or domain">
  <button onclick="scan()">Scan</button>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <div class="result" id="result"></div>
</div>

<a href="../../index.html">← Back to Portfolio</a>

<script>
function isValidIP(ip) {
  const parts = ip.split(".");
  if (parts.length !== 4) return false;

  return parts.every(p => {
    const num = Number(p);
    return p !== "" && num >= 0 && num <= 255;
  });
}

function isValidDomain(domain) {
  return domain.includes(".") && domain.length > 3;
}

function scan() {
  const input = document.getElementById("target").value.trim();
  const result = document.getElementById("result");
  const bar = document.getElementById("bar");

  result.innerHTML = "";
  bar.style.width = "0%";

  // VALIDATION
  if (!isValidIP(input) && !isValidDomain(input)) {
    result.innerHTML = `<p class="error">❌ Invalid IP or domain</p>`;
    return;
  }

  const ports = [
    { port: 21, service: "FTP" },
    { port: 22, service: "SSH" },
    { port: 80, service: "HTTP" },
    { port: 443, service: "HTTPS" },
    { port: 3306, service: "MySQL" },
    { port: 8080, service: "Proxy" }
  ];

  let i = 0;
  result.innerHTML = "<p>Scanning target...</p>";

  const interval = setInterval(() => {
    if (i >= ports.length) {
      clearInterval(interval);
      return;
    }

    const p = ports[i];
    const isOpen = Math.random() > 0.4;

    result.innerHTML += `
      <p>
        Port ${p.port} (${p.service}): 
        <span class="${isOpen ? "open" : "closed"}">
          ${isOpen ? "OPEN" : "CLOSED"}
        </span>
      </p>
    `;

    bar.style.width = ((i + 1) / ports.length) * 100 + "%";
    i++;
  }, 500);
}
</script>

</body>
</html>
