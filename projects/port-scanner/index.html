<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Port Scanner | Nadeem</title>

  <!-- REMOVE main CSS -->
  <!-- <link rel="stylesheet" href="../../style.css"> -->

  <style>
    body {
      background: #020617;
      color: #00ff9f;
      font-family: monospace;
      text-align: center;
      padding: 50px;
    }

    input {
      padding: 10px;
      width: 250px;
      background: black;
      border: 1px solid #00ff9f;
      color: #00ff9f;
    }

    button {
      padding: 10px 20px;
      background: #00ff9f;
      border: none;
      cursor: pointer;
    }

    .open { color: #00ff9f; }
    .closed { color: red; }
  </style>
</head>

<body>

<h1>🌐 Port Scanner</h1>

<input type="text" id="target" placeholder="Enter IP or domain">
<button onclick="scan()">Scan</button>

<div id="result"></div>

<script>
function scan() {
  const result = document.getElementById("result");
  result.innerHTML = "Scanning...";

  setTimeout(() => {
    result.innerHTML = `
      <p>Port 22: <span class="open">Open</span></p>
      <p>Port 80: <span class="open">Open</span></p>
      <p>Port 443: <span class="open">Open</span></p>
      <p>Port 3306: <span class="closed">Closed</span></p>
    `;
  }, 1500);
}
</script>

</body>
</html>
