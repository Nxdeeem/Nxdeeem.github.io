<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Analyzer | Nadeem</title>

  <!-- REMOVE main CSS for now -->
  <!-- <link rel="stylesheet" href="../../style.css"> -->

  <style>
    body {
      background: #020617;
      color: #00ff9f;
      font-family: monospace;
      text-align: center;
      padding: 50px;
    }

    input {
      padding: 10px;
      width: 280px;
      background: black;
      border: 1px solid #00ff9f;
      color: #00ff9f;
    }

    .meter {
      width: 300px;
      height: 10px;
      background: #111;
      margin: 20px auto;
    }

    .meter-fill {
      height: 100%;
      width: 0%;
    }
  </style>
</head>

<body>

<h1>🔐 Password Analyzer</h1>

<input type="password" id="password" placeholder="Enter password...">

<div class="meter">
  <div class="meter-fill" id="meter"></div>
</div>

<p id="strength"></p>

<script>
const input = document.getElementById("password");
const meter = document.getElementById("meter");

input.addEventListener("input", () => {
  const pwd = input.value;
  let strength = pwd.length;

  meter.style.width = (strength * 10) + "%";

  document.getElementById("strength").innerText =
    strength < 5 ? "Weak" : strength < 10 ? "Medium" : "Strong";
});
</script>

</body>
</html>
