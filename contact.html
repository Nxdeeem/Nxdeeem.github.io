<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- STAR BACKGROUND -->
<canvas id="stars"></canvas>

<!-- NAVBAR -->
<nav id="navbar" class="scrolled">
  <div class="nav-inner">
    <div class="nav-logo">Nadeem<span class="dot">.</span></div>
    <div class="nav-links" id="nav-links">
      <a href="index.html">Home</a>
      <a href="index.html#tools">Skills</a>
      <a href="index.html#projects">Projects</a>
      <a href="contact.html" class="active">Contact</a>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- CONTACT SECTION -->
<section id="contact" style="min-height:100vh; align-items:flex-start; justify-content:center; opacity:1; transform:none;">
  <div class="section-label">Say Hi</div>
  <h2 class="section-title">Get In Touch</h2>
  <p class="contact-sub">I'm always open to new opportunities, collaborations, or just a good conversation about tech.</p>

  <div class="contact-links" style="margin-bottom: 3rem;">
    <a href="mailto:nadeemnajumudeen@gmail.com" class="contact-card">
      <span class="contact-icon">✉️</span>
      <span class="contact-label">Email Me</span>
      <span class="contact-arrow">↗</span>
    </a>
    <a href="https://github.com/Nxdeeem" target="_blank" class="contact-card">
      <span class="contact-icon"><i class="devicon-github-original" style="font-size:1.2rem;"></i></span>
      <span class="contact-label">GitHub</span>
      <span class="contact-arrow">↗</span>
    </a>
    <a href="https://linkedin.com/in/nadeem-najumudeen-b6b731325/" target="_blank" class="contact-card">
      <span class="contact-icon"><i class="devicon-linkedin-plain colored" style="font-size:1.2rem;"></i></span>
      <span class="contact-label">LinkedIn</span>
      <span class="contact-arrow">↗</span>
    </a>
    <a href="https://www.instagram.com/___nxdeem___/" target="_blank" class="contact-card">
      <span class="contact-icon">📸</span>
      <span class="contact-label">Instagram</span>
      <span class="contact-arrow">↗</span>
    </a>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <span>Designed &amp; Developed by <strong>Nadeem</strong> 😎</span>
  <span class="footer-year">© 2026</span>
</footer>

<script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;
const mouse = { x: w/2, y: h/2 };
const stars = [];
const shootingStars = [];

for (let i = 0; i < 160; i++) {
  stars.push({
    x: Math.random()*w, y: Math.random()*h,
    radius: Math.random()*1.8+0.3,
    vx: (Math.random()-0.5)*0.12, vy: (Math.random()-0.5)*0.12,
    alpha: Math.random()*0.5+0.5, twinkle: Math.random()*0.02
  });
}

window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener("resize", () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; });

function createShootingStar() {
  const colors = ['#ffffff','#38bdf8','#818cf8','#a78bfa'];
  shootingStars.push({
    x: Math.random()*w*0.7, y: Math.random()*h*0.4,
    len: Math.random()*120+60, speed: Math.random()*12+6,
    angle: Math.PI/4+(Math.random()-0.5)*0.3, alpha: 1,
    color: colors[Math.floor(Math.random()*colors.length)]
  });
}

function animate() {
  ctx.clearRect(0,0,w,h);
  stars.forEach(s => {
    s.x += s.vx + (mouse.x-w/2)*0.0003;
    s.y += s.vy + (mouse.y-h/2)*0.0003;
    s.alpha += s.twinkle;
    if (s.alpha>1||s.alpha<0.3) s.twinkle*=-1;
    if (s.x<0) s.x=w; if (s.x>w) s.x=0;
    if (s.y<0) s.y=h; if (s.y>h) s.y=0;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.radius,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.alpha})`; ctx.fill();
  });
  for (let i=0;i<stars.length;i++) {
    for (let j=i+1;j<stars.length;j++) {
      const dx=stars[i].x-stars[j].x, dy=stars[i].y-stars[j].y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if (dist<110) {
        ctx.strokeStyle=`rgba(100,180,255,${(1-dist/110)*0.25})`;
        ctx.lineWidth=0.5; ctx.beginPath();
        ctx.moveTo(stars[i].x,stars[i].y); ctx.lineTo(stars[j].x,stars[j].y); ctx.stroke();
      }
    }
  }
  stars.forEach(s => {
    const dxm=s.x-mouse.x, dym=s.y-mouse.y;
    const mdist=Math.sqrt(dxm*dxm+dym*dym);
    if (mdist<120) {
      ctx.strokeStyle=`rgba(56,189,248,${(1-mdist/120)*0.6})`;
      ctx.lineWidth=0.8; ctx.beginPath();
      ctx.moveTo(s.x,s.y); ctx.lineTo(mouse.x,mouse.y); ctx.stroke();
    }
  });
  shootingStars.forEach((ss,idx) => {
    ctx.save(); ctx.globalAlpha=ss.alpha;
    const grad=ctx.createLinearGradient(ss.x,ss.y,ss.x-Math.cos(ss.angle)*ss.len,ss.y-Math.sin(ss.angle)*ss.len);
    grad.addColorStop(0,ss.color); grad.addColorStop(1,'transparent');
    ctx.strokeStyle=grad; ctx.lineWidth=2; ctx.beginPath();
    ctx.moveTo(ss.x,ss.y); ctx.lineTo(ss.x-Math.cos(ss.angle)*ss.len,ss.y-Math.sin(ss.angle)*ss.len); ctx.stroke(); ctx.restore();
    ss.x+=Math.cos(ss.angle)*ss.speed; ss.y+=Math.sin(ss.angle)*ss.speed; ss.alpha-=0.015;
    if (ss.alpha<=0||ss.x>w||ss.y>h) shootingStars.splice(idx,1);
  });
  if (Math.random()<0.003) createShootingStar();
  requestAnimationFrame(animate);
}
animate();

const hamburger = document.getElementById("hamburger");
const navLinks = document.getElementById("nav-links");
hamburger.addEventListener("click", () => {
  navLinks.classList.toggle("open");
  hamburger.classList.toggle("active");
});
</script>

</body>
</html>
