<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Nadeem</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="fade-in">

  <!-- ⭐ STAR BACKGROUND -->
  <canvas id="stars-canvas"></canvas>

  <!-- HEADER -->
  <header class="fixed top-0 w-full">
    <nav class="flex justify-between items-center px-8 py-4">

        <a href="index.html#skills">Skills</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <!-- CONTACT SECTION -->
  <section id="contact" class="min-h-screen flex flex-col justify-center items-center text-center">
    <h2 class="text-4xl font-bold mb-6">CONTACTS</h2>

    <div class="flex gap-8 text-3xl">

      <a href="mailto:yourmail@gmail.com" target="_blank" title="Email">

  <!-- FOOTER -->
  <footer>
    © 2026 Nadeem Najumudeen

  <!-- ⭐ CONSTELLATION SCRIPT (same as index) -->
  <script>
  const canvas = document.getElementById("stars-canvas");
  const ctx = canvas.getContext("2d");

  let w, h;
  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  /* ================= STAR SETTINGS ================= */
  const STAR_COUNT = 160;
  const CONNECT_DIST = 130;

  const mouse = { x: null, y: null };

  window.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });

  window.addEventListener("mouseleave", () => {
    mouse.x = null;
    mouse.y = null;
  });

  /* ================= STAR OBJECT ================= */
  const stars = [];

  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.25,
      vy: (Math.random() - 0.5) * 0.25,
      size: Math.random() * 1.5 + 0.5,
      depth: Math.random() * 0.6 + 0.4   // ⭐ parallax depth
    });
  }

  /* ================= ANIMATION ================= */
  function animate() {
    ctx.clearRect(0, 0, w, h);

    for (let i = 0; i < stars.length; i++) {
      const s = stars[i];

      // 🌌 Parallax movement
      s.x += s.vx * s.depth;
      s.y += s.vy * s.depth;

      if (s.x < 0 || s.x > w) s.vx *= -1;
      if (s.y < 0 || s.y > h) s.vy *= -1;

      // ✨ Draw star
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fillStyle = "#fff";
      ctx.fill();

      // 🔗 Lines between stars
      for (let j = i + 1; j < stars.length; j++) {
        const t = stars[j];
        const dx = s.x - t.x;
        const dy = s.y - t.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < CONNECT_DIST) {
          ctx.strokeStyle = `rgba(255,255,255,${1 - dist / CONNECT_DIST})`;
          ctx.lineWidth = 0.4;
          ctx.beginPath();
          ctx.moveTo(s.x, s.y);
          ctx.lineTo(t.x, t.y);
          ctx.stroke();
        }
      }

      // 🖱 Mouse interaction
      if (mouse.x && mouse.y) {
        const dxm = s.x - mouse.x;
        const dym = s.y - mouse.y;
        const mdist = Math.sqrt(dxm * dxm + dym * dym);

        if (mdist < 140) {
          ctx.strokeStyle = `rgba(255,255,255,${1 - mdist / 140})`;
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(s.x, s.y);
          ctx.lineTo(mouse.x, mouse.y);
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(animate);
  }

  animate();
</script>


</body>
</html>
