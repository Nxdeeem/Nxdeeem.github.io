<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Nadeem Najumudeen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="bg-gray-900 py-4 fixed top-0 w-full z-50 shadow-md">
    <nav class="container mx-auto px-4 flex justify-between items-center">
      <h1 class="text-xl font-bold text-white">Nadeem Najumudeen</h1>
      <ul class="hidden md:flex space-x-6 text-gray-300">
        <li><a href="index.html#home" class="hover:text-white transition">HOME</a></li>
        <li><a href="index.html#about" class="hover:text-white transition">ABOUT</a></li>
        <li><a href="index.html#tools" class="hover:text-white transition">TOOLS</a></li>
        <li><a href="index.html#skills" class="hover:text-white transition">SKILLS</a></li>
        <li><a href="projects.html" class="hover:text-white transition">PROJECTS</a></li>
        <li><a href="contact.html" class="text-white font-semibold transition">CONTACT</a></li>
      </ul>
      <button id="menu-btn" class="md:hidden text-white focus:outline-none">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </nav>
  </header>

  <section class="min-h-screen relative flex flex-col justify-center items-center text-center px-6 pt-28 bg-gradient-to-b from-black to-gray-900 overflow-hidden">
    <canvas id="stars-canvas" class="absolute top-0 left-0 w-full h-full z-0"></canvas>
    <div class="relative z-10">
      <h2 class="text-4xl font-bold mb-10 text-white">CONTACT ME</h2>
      <div class="space-y-6 text-lg">
        <div><a href="mailto:nadeemnajumudeen@gmail.com" class="underline hover:text-blue-400">Email: nadeemnajumudeen@gmail.com</a></div>
        <div><a href="https://www.linkedin.com/in/nadeem-najumudeen-b6b731325/" target="_blank" class="underline hover:text-blue-500">LinkedIn</a></div>
        <div><a href="https://www.instagram.com/___nxdeem___" target="_blank" class="underline hover:text-pink-400">Instagram</a></div>
        <div><a href="https://github.com/Nxdeeem" target="_blank" class="underline hover:text-gray-400">GitHub</a></div>
      </div>
    </div>
  </section>

  <footer class="bg-gray-800 py-4 text-center text-gray-400">&copy; 2026 Nadeem Najumudeen</footer>

  <script>
    // Mobile menu toggle
    const menuBtn = document.getElementById("menu-btn");
    const mobileMenu = document.getElementById("mobile-menu");
    menuBtn.addEventListener("click",()=>{ mobileMenu.classList.toggle("hidden"); });

    // Stars canvas
    const canvas = document.getElementById("stars-canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const stars = [];
    for(let i=0;i<150;i++){
      stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*1.2, dx:(Math.random()-0.5)*0.2, dy:(Math.random()-0.5)*0.2});
    }

    function animateStars(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();
        s.x+=s.dx; s.y+=s.dy;
        if(s.x>canvas.width)s.x=0; if(s.x<0)s.x=canvas.width;
        if(s.y>canvas.height)s.y=0; if(s.y<0)s.y=canvas.height;
      });
      requestAnimationFrame(animateStars);
    }
    animateStars();
  </script>
</body>
</html>
