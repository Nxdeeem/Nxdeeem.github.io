  <!-- CONTACT SECTION -->
  <section id="contact" class="min-h-screen flex flex-col justify-center items-center text-center px-6 pt-24">

  <!-- SCRIPTS -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.body.classList.add("fade-in");
      AOS.init({ duration: 800, once: true, disable: false });

      // Mobile menu toggle
      const menuBtn = document.getElementById("menu-btn");
      const mobileMenu = document.getElementById("mobile-menu");
      menuBtn.addEventListener("click",()=>{ mobileMenu.classList.toggle("hidden"); });

      // Stars canvas
      const canvas = document.getElementById("stars-canvas");
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const stars = [];
      for(let i=0;i<150;i++){
        stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.2,dx:(Math.random()-0.5)*0.2,dy:(Math.random()-0.5)*0.2});
      }

      const shootingStars = [];
      function createShootingStar(){
        shootingStars.push({
          x: Math.random()*canvas.width,
          y: Math.random()*canvas.height/2,
          len: Math.random()*200+100,
          speed: Math.random()*10+6,
          angle: Math.random()*Math.PI/6 - Math.PI/12
        });
      }
      setInterval(createShootingStar,2000);

      function animateStars(){
        ctx.clearRect(0,0,canvas.width,canvas.height);

        stars.forEach(s=>{
          ctx.beginPath();
          ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
          ctx.fillStyle="white";
          ctx.fill();
          s.x += s.dx; s.y += s.dy;
          if(s.x>canvas.width)s.x=0; if(s.x<0)s.x=canvas.width;
          if(s.y>canvas.height)s.y=0; if(s.y<0)s.y=canvas.height;
        });

        for(let i=shootingStars.length-1;i>=0;i--){
          let s=shootingStars[i];
          ctx.beginPath();
          ctx.moveTo(s.x,s.y);
          ctx.lineTo(s.x - s.len*Math.cos(s.angle), s.y - s.len*Math.sin(s.angle));
          ctx.strokeStyle="white";
          ctx.lineWidth=2;
          ctx.stroke();
          s.x += s.speed*Math.cos(s.angle);
          s.y += s.speed*Math.sin(s.angle);
          if(s.x>canvas.width || s.y>canvas.height) shootingStars.splice(i,1);
        }

        // Constellation lines
        const maxDist = 120;
        for(let i=0;i<stars.length;i++){
          for(let j=i+1;j<stars.length;j++){
            const dx=stars[i].x-stars[j].x, dy=stars[i].y-stars[j].y;
            const dist=Math.sqrt(dx*dx+dy*dy);
            if(dist<maxDist){
              ctx.beginPath();
              ctx.moveTo(stars[i].x,stars[i].y);
              ctx.lineTo(stars[j].x,stars[j].y);
              ctx.strokeStyle="rgba(255,255,255,"+(1-dist/maxDist)+")";
              ctx.lineWidth=0.2;
              ctx.stroke();
            }
          }
        }

        requestAnimationFrame(animateStars);
      }
      animateStars();
    });
  </script>
</body>
</html>
