<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Nadeem</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Devicon -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="fade-in">

  <!-- ⭐ STAR BACKGROUND -->
  <canvas id="stars-canvas"></canvas>

  <!-- HEADER -->
  <header class="fixed top-0 w-full">
    <nav class="flex justify-between items-center px-8 py-4">
      <h1 class="text-xl font-bold">Nadeem</h1>
      <div class="space-x-6 hidden md:block">
        <a href="index.html">Home</a>
        <a href="index.html#skills">Skills</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <!-- CONTACT SECTION -->
  <section id="contact" class="min-h-screen flex flex-col justify-center items-center text-center">
    <h2 class="text-4xl font-bold mb-6">CONTACTS</h2>

    <div class="flex gap-8 text-3xl">

      <a href="mailto:yourmail@gmail.com" target="_blank" title="Email">
        📧
      </a>

      <a href="https://github.com/Nxdeeem" target="_blank" title="GitHub">
        <i class="devicon-github-original"></i>
      </a>

      <a href="https://linkedin.com" target="_blank" title="LinkedIn">
        <i class="devicon-linkedin-plain colored"></i>
      </a>

      <a href="https://instagram.com" target="_blank" title="Instagram">
        📸
      </a>

    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    © 2026 Nadeem Najumudeen
  </footer>

  <!-- ⭐ CONSTELLATION SCRIPT (same as index) -->
  <script>
    const canvas = document.getElementById("stars-canvas");
    const ctx = canvas.getContext("2d");

    let stars = [];
    const COUNT = 120;
    const MAX_DIST = 120;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    for (let i = 0; i < COUNT; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3
      });
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      stars.forEach(s => {
        s.x += s.vx;
        s.y += s.vy;

        if (s.x < 0 || s.x > canvas.width) s.vx *= -1;
        if (s.y < 0 || s.y > canvas.height) s.vy *= -1;

        ctx.beginPath();
        ctx.arc(s.x, s.y, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.fill();
      });

      for (let i = 0; i < stars.length; i++) {
        for (let j = i + 1; j < stars.length; j++) {
          const dx = stars[i].x - stars[j].x;
          const dy = stars[i].y - stars[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < MAX_DIST) {
            ctx.strokeStyle = `rgba(255,255,255,${1 - dist / MAX_DIST})`;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(stars[i].x, stars[i].y);
            ctx.lineTo(stars[j].x, stars[j].y);
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(animate);
    }
    animate();
  </script>

</body>
</html>
