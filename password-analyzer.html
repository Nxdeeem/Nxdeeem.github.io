<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Analyzer</title>

<style>
body {
  background: #020617;
  color: #00ff9f;
  font-family: "Courier New", monospace;
  text-align: center;
  padding: 50px;
}

h1 {
  color: #00ff9f;
  text-shadow: 0 0 10px #00ff9f;
}

input {
  background: black;
  border: 1px solid #00ff9f;
  color: #00ff9f;
  padding: 12px;
  width: 280px;
  outline: none;
  font-family: inherit;
}

.meter {
  width: 300px;
  height: 10px;
  background: #111;
  margin: 15px auto;
  border-radius: 5px;
  overflow: hidden;
}

.meter-fill {
  height: 100%;
  width: 0%;
  transition: 0.4s;
}

.info {
  margin-top: 15px;
  font-size: 14px;
  color: #94a3b8;
}

strong {
  color: #00ff9f;
}
</style>
</head>

<body>

<h1>🔐 Password Analyzer</h1>

<input type="text" id="password" placeholder="Enter password..." />

<div class="meter">
  <div class="meter-fill" id="meter"></div>
</div>

<p id="strength"></p>
<p class="info" id="entropy"></p>
<p class="info" id="crack"></p>

<script>
const input = document.getElementById("password");
const meter = document.getElementById("meter");

input.addEventListener("input", analyze);

function analyze() {
  const pwd = input.value;

  let charset = 0;
  if (/[a-z]/.test(pwd)) charset += 26;
  if (/[A-Z]/.test(pwd)) charset += 26;
  if (/[0-9]/.test(pwd)) charset += 10;
  if (/[^a-zA-Z0-9]/.test(pwd)) charset += 32;

  const entropy = pwd.length * Math.log2(charset || 1);

  let strength = "";
  let color = "";
  let width = 0;

  if (entropy < 28) {
    strength = "Weak";
    color = "red";
    width = 25;
  } else if (entropy < 50) {
    strength = "Medium";
    color = "orange";
    width = 50;
  } else if (entropy < 80) {
    strength = "Strong";
    color = "yellow";
    width = 75;
  } else {
    strength = "Very Strong";
    color = "#00ff9f";
    width = 100;
  }

  meter.style.width = width + "%";
  meter.style.background = color;

  document.getElementById("strength").innerHTML =
    "Strength: <strong>" + strength + "</strong>";

  document.getElementById("entropy").innerText =
    "Entropy: " + entropy.toFixed(2) + " bits";

  document.getElementById("crack").innerText =
    "Estimated crack time: " + estimateTime(entropy);
}

function estimateTime(entropy) {
  const guessesPerSecond = 1e10;
  const seconds = Math.pow(2, entropy) / guessesPerSecond;

  if (seconds < 60) return "Instantly 💀";
  if (seconds < 3600) return Math.floor(seconds / 60) + " minutes";
  if (seconds < 86400) return Math.floor(seconds / 3600) + " hours";
  if (seconds < 31536000) return Math.floor(seconds / 86400) + " days";

  return Math.floor(seconds / 31536000) + " years 🔐";
}
</script>

</body>
</html>
