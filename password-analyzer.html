<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Analyzer</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 50px;
    }
    input {
      padding: 10px;
      width: 250px;
      border-radius: 5px;
      border: none;
    }
    button {
      padding: 10px 15px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🔐 Password Security Analyzer</h1>

<input type="text" id="password" placeholder="Enter password">
<br>
<button onclick="analyze()">Analyze</button>

<p id="result"></p>

<script>
function analyze() {
  const pwd = document.getElementById("password").value;
  let strength = "Weak";

  if (pwd.length > 8 && /[A-Z]/.test(pwd) && /[0-9]/.test(pwd)) {
    strength = "Strong";
  } else if (pwd.length > 5) {
    strength = "Medium";
  }

  document.getElementById("result").innerText = "Strength: " + strength;
}
</script>

</body>
</html>
